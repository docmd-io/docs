name: Deploy to GitHub Pages

on:
  # Trigger on push to main branch
  push:
    branches: [ "main" ]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'

      # Cache embedding models to avoid re-downloading on every build
      # Models are ~23-270MB and stored in ~/.docmd-search/models/
      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: ~/.docmd-search/models
          key: docmd-search-models-${{ runner.os }}-${{ hashFiles('**/docmd.config.js', '**/docmd.config.json') }}
          restore-keys: |
            docmd-search-models-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5